## Docker Compose configuration file for local development environment with PostgreSQL and application container
services:

    # PostgreSQL container
    postgres:
        image: postgres:17.2-alpine
        container_name: postgres
        restart: unless-stopped
        ports:
            - '5432:5432'
        volumes:
            - postgres-data:/var/lib/postgresql/data
        environment:
            POSTGRES_USER: motogp
            POSTGRES_PASSWORD: motogp
            POSTGRES_DB: motogp
        healthcheck:
            test: [ 'CMD', 'pg_isready', '-U', 'postgres' ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    # Application container
    app:
        container_name: app
        restart: unless-stopped
        build:
            context: .
            dockerfile: Dockerfile
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - '8080:8080'
        environment:
            SPRING_DATASOURCE_HOST: postgres
            SPRING_DATASOURCE_PORT: 5432
            SPRING_DATASOURCE_DATABASE: motogp
            SPRING_DATASOURCE_USERNAME: motogp
            SPRING_DATASOURCE_PASSWORD: motogp
        healthcheck:
            test: [ 'CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/motogp/api/actuator/health' ]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 25s

## Volumes
volumes:
    postgres-data: